name: Publish to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Validate release source
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          with Path("pyproject.toml").open("rb") as pyproject_file:
              version = tomllib.load(pyproject_file)["project"]["version"]

          expected_tag = f"v{version}"
          release_tag = os.environ["RELEASE_TAG"]
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {release_tag!r} must match package tag {expected_tag!r}."
              )
          PY
          tag_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
          head_commit=$(git rev-parse HEAD)
          main_commit=$(git rev-parse refs/remotes/origin/main)
          test "$tag_commit" = "$head_commit" || {
            echo "Release tag must resolve to the checked-out commit."
            exit 1
          }
          test "$tag_commit" = "$main_commit" || {
            echo "Release tag must resolve to the default branch tip."
            exit 1
          }

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uv run twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/prefect-xquik/
    permissions:
      contents: read
      id-token: write # Exchange the release identity for a short-lived PyPI token.

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          packages-dir: dist/
