name: ClusterFuzzLite

on:
  push:
    branches: [main]
    paths:
      - ".clusterfuzzlite/**"
      - ".github/workflows/fuzz.yml"
      - "prefect_xquik/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - ".clusterfuzzlite/**"
      - ".github/workflows/fuzz.yml"
      - "prefect_xquik/**"
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clusterfuzzlite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz Client Helpers
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build fuzzers
        # The action commit is immutable. Its upstream action.yml still selects
        # Google's mutable :v1 runtime image, which this repository cannot pin.
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          language: python
          sanitizer: address

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          language: python
          mode: batch
          sanitizer: address
          fuzz-seconds: 180
